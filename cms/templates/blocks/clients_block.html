<section class="py-5">
  <div class="container text-center">
    <p class="section-eyebrow mb-2">Clients</p>
    <h2 class="fw-bold mb-5">A partial list of valued clients</h2>
    <div class="row g-4">
      {% for tag, clients in categories.items %}
        <div class="col-md-3">
          <p class="section-eyebrow border-top border-bottom py-2 mb-3">{{ tag }}</p>
          <ul class="list-unstyled text-secondary">
            {% for client in clients %}
              <li class="py-1">
                {% if client.url %}
                  <a class="text-decoration-none" target="_blank" href="{{ client.url }}" style="color:inherit;">{{ client }}</a>
                {% else %}
                  {{ client }}
                {% endif %}
              </li>
            {% endfor %}
          </ul>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
