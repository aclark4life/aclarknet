<section class="py-5 bg-light" id="testimonials">
  <div class="container">
    <p class="text-center section-eyebrow mb-2">Client Feedback</p>
    <h2 class="text-center fw-bold mb-5">What our clients are saying</h2>
    <div class="row g-4">
      {% for testimonial in testimonials %}
        <div class="col-md-4">
          <div class="p-4 h-100 rounded-3 site-card" style="background:#fff;">
            <p class="text-secondary lh-lg mb-4">&ldquo;{{ testimonial.description }}&rdquo;</p>
            <div class="fw-semibold">&mdash; {{ testimonial.name }}</div>
          </div>
        </div>
      {% endfor %}
    </div>
    <div class="text-center mt-5">
      <a href="/clients/#testimonials" class="btn btn-outline-secondary">View more</a>
    </div>
  </div>
</section>
