{% extends 'base.html' %}
{% load i18n static %}
{% block title %}Change Password{% endblock %}
{% block content %}
  <section class="py-5 auth-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="p-4 p-md-5 rounded-3 preview-card auth-card text-center">
            <p class="section-eyebrow mb-2">Account</p>
            <h1 class="fw-bold mb-4">Change Password</h1>
            <p class="text-muted mb-4">{% trans 'Your password is now changed.' %}</p>
            <a href="{% url 'account_login' %}" class="btn btn-brand-outline w-100">{% trans 'Sign In' %}</a>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
