{% load static %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #1997C6;
    --dark:  #0f2b3d;
  }
  .dash-nav {
    background: var(--dark);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 1.25rem 0;
    box-shadow: 0 1px 6px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  .dash-nav .brand-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    padding: 0 !important;
  }
  .dash-nav .brand-wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1;
    gap: 5px;
  }
  .dash-nav .brand-top {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #f8f9fa;
  }
  .dash-nav .brand-top .brand-net { color: var(--brand); }
  .dash-nav .brand-llc {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
  }
  .dash-nav .nav-link {
    color: #adb5bd;
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }
  .dash-nav .nav-link:hover,
  .dash-nav .nav-link.active { color: #fff; background: rgba(255,255,255,0.08); }
  .dash-nav .btn-nav-cta {
    font-size: 0.875rem;
    font-weight: 600;
    padding: 0.4rem 1.1rem;
    border-radius: 4px;
    border: 1.5px solid rgba(255,255,255,0.4);
    color: #fff;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .dash-nav .btn-nav-cta:hover { background: #fff; color: var(--dark); }

  .dash-footer { background: var(--dark); color: #adb5bd; padding: 1.5rem 0; }
  .dash-footer .brand-mark { display: inline-flex; align-items: center; text-decoration: none; }
  .dash-footer .brand-wordmark { display: flex; flex-direction: column; line-height: 1; gap: 5px; }
  .dash-footer .brand-top {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem; font-weight: 800; letter-spacing: 0.06em; color: #dee2e6;
  }
  .dash-footer .brand-top .brand-net { color: var(--brand); }
  .dash-footer .brand-llc {
    display: flex; justify-content: space-between; width: 100%;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem; font-weight: 700; color: rgba(255,255,255,0.4);
  }
  .dash-footer a { color: #adb5bd; text-decoration: none; transition: color 0.15s; }
  .dash-footer a:hover { color: #fff; }
  .dash-footer .social-icon { font-size: 1.3rem; margin: 0 0.35rem; }
  .dash-banner {
    background: #fff3cd;
    border-bottom: 2px solid #ffc107;
    font-size: 0.85rem;
  }
</style>

<div class="dash-banner py-2 text-center">
  <i class="fa-solid fa-flask me-1"></i>
  <strong>Design Preview</strong>
</div>

<nav class="dash-nav navbar navbar-expand-md">
  <div class="container">
    <a class="navbar-brand brand-mark" href="/">
      <span class="brand-wordmark">
        <span class="brand-top">ACLARK<span class="brand-net">.NET</span></span>
        <span class="brand-llc"><span>L</span><span>L</span><span>C</span></span>
      </span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#dashNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="dashNav">
      <ul class="navbar-nav ms-auto align-items-center gap-1">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="/about/" data-bs-toggle="dropdown">About</a>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" href="/about/#team">Team</a></li>
            <li><a class="dropdown-item" href="/about/#dcpython">Community</a></li>
            <li><a class="dropdown-item" href="/about/#book">Publications</a></li>
          </ul>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="/clients/" data-bs-toggle="dropdown">Clients</a>
          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" href="/clients/#testimonials">Testimonials</a></li>
          </ul>
        </li>
        <li class="nav-item"><a class="nav-link" href="/services/">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="/careers/">Careers</a></li>
        <li class="nav-item ms-2"><a class="btn-nav-cta" href="/contact-us/">Contact Us</a></li>
        <li class="nav-item dropdown ms-3">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" data-bs-toggle="dropdown">
            <i class="fa-solid fa-circle-user fs-5"></i>
            <span>{{ request.user.get_short_name|default:request.user.username }}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
            <li><a class="dropdown-item" href="{% url 'profile_view' %}"><i class="fa-solid fa-user me-2"></i>Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="{% url 'account_logout' %}"><i class="fa-solid fa-right-from-bracket me-2"></i>Sign Out</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
