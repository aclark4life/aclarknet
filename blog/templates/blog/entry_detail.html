{% extends "base.html" %}

{% block title %}{{ entry.title }}{% endblock %}

{% block content %}
<div class="container py-5">
  <article>
    <header class="mb-4">
      <h1>{{ entry.title }}</h1>
      <p class="text-muted">
        <time datetime="{{ entry.pub_date|date:'Y-m-d' }}">{{ entry.pub_date }}</time>
        {% if entry.tags %}
          &mdash; {{ entry.tags }}
        {% endif %}
      </p>
    </header>
    <div class="entry-body">
      {% autoescape off %}{{ entry.render_body }}{% endautoescape %}
    </div>
    <footer class="mt-5">
      <a href="{% url 'blog:entry_list' %}">&larr; Back to Blog</a>
    </footer>
  </article>
</div>
{% endblock %}
